<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dika-pedia 🚀 - riwayat deposit</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        body { 
            background: #003344;
            background-image: radial-gradient(circle at 50% -20%, #00acc144, transparent);
            color: #fff; min-height: 100vh; padding: 20px;
            text-transform: lowercase;
        }
        .header { display: flex; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(0, 172, 193, 0.2); }
        .header i { font-size: 20px; margin-right: 15px; cursor: pointer; color: #00acc1; }
        .header h3 { font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

        .deposit-card {
            background: rgba(0, 34, 45, 0.8);
            border: 1px solid rgba(0, 172, 193, 0.3);
            border-radius: 15px; padding: 15px; margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }
        .depo-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 10px; }
        .method-name { font-weight: 700; color: #00ff88; text-transform: uppercase; }
        
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: rgba(255, 136, 0, 0.2); color: #ff8800; border: 1px solid #ff8800; }
        .status-success { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff88; }
        .status-canceled { background: rgba(255, 68, 68, 0.2); color: #ff4444; border: 1px solid #ff4444; }

        .depo-body { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-box label { display: block; font-size: 10px; color: #00acc1; font-weight: 700; text-transform: uppercase; }
        .info-box p { font-size: 14px; font-weight: 700; margin-top: 2px; }

        .galau-box {
            grid-column: 1 / -1; background: rgba(0,0,0,0.2);
            padding: 10px; border-radius: 8px; text-align: left;
            border-left: 3px solid #00acc1; margin-top: 10px;
        }
        .galau-text { font-size: 11px; color: #aaa; font-style: italic; }

        .empty-state { text-align: center; margin-top: 50px; opacity: 0.5; font-weight: 500; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-chevron-left" onclick="window.location.href='dashboard.html'"></i>
        <h3>riwayat deposit</h3>
    </div>

    <div id="depositList">
        <div class="empty-state">sedang memuat kenangan lama...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC_5LQ6U3DtMf4STbDjLymazm8I_zySbSw",
            authDomain: "myproject-485415.firebaseapp.com",
            databaseURL: "https://myproject-485415-default-rtdb.firebaseio.com",
            projectId: "myproject-485415",
            storageBucket: "myproject-485415.firebasestorage.app",
            messagingSenderId: "450623193142",
            appId: "1:450623193142:web:d7a9caf66e1dff8d495897"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) loadDeposits(user.uid);
            else window.location.href = 'login.html';
        });

        function loadDeposits(uid) {
            db.ref('deposits/' + uid).orderByChild('timestamp').on('value', snapshot => {
                const container = document.getElementById('depositList');
                container.innerHTML = '';
                
                if (!snapshot.exists()) {
                    container.innerHTML = '<div class="empty-state">belum ada deposit, sama kaya hati yang masih kosong ini.</div>';
                    return;
                }

                let deposits = [];
                snapshot.forEach(child => {
                    deposits.push({ key: child.key, ...child.val() });
                });

                deposits.reverse().forEach(depo => {
                    renderCard(depo);
                });
            });
        }

        function renderCard(depo) {
            const container = document.getElementById('depositList');
            const card = document.createElement('div');
            card.className = 'deposit-card';
            
            let statusBadge = '';
            let galauMsg = '';

            const status = (depo.status || '').toLowerCase();

            if (status === 'pending') {
                statusBadge = '<span class="status-badge status-pending">pending</span>';
                galauMsg = 'sabar ya, saldo lagi divalidasi, gak kaya janji dia yang nggak pernah terbukti.';
            } else if (status === 'success' || status === 'completed') {
                statusBadge = '<span class="status-badge status-success">success</span>';
                galauMsg = 'deposit sukses, saldo udah masuk. semoga bahagia ya, meski bahagianya bukan sama aku.';
            } else if (status === 'canceled' || status === 'cancel') {
                statusBadge = '<span class="status-badge status-canceled">canceled</span>';
                galauMsg = 'yah dibatalin, emang bener ya, yang udah didepan mata aja bisa pergi kalo emang niatnya mau udahan.';
            } else {
                statusBadge = '<span class="status-badge status-failed">failed</span>';
                galauMsg = 'deposit gagal. mungkin kamu kurang teliti, atau emang kita nggak ditakdirkan buat sejalan.';
            }

            card.innerHTML = `
                <div class="depo-header">
                    <span class="method-name">${depo.metode || 'qris / manual'}</span>
                    ${statusBadge}
                </div>
                <div class="depo-body">
                    <div class="info-box"><label>jumlah</label><p>rp ${parseInt(depo.jumlah || 0).toLocaleString()}</p></div>
                    <div class="info-box"><label>tanggal</label><p>${depo.tanggal || '-'}</p></div>
                    <div class="info-box" style="grid-column: 1 / -1;"><label>id deposit</label><p>#${depo.key.substring(0, 12)}</p></div>
                    <div class="galau-box">
                        <div class="galau-text">${galauMsg}</div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }
    </script>
</body>
</html>
