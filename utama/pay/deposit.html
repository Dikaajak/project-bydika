<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooxpedia - Deposit</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        body { 
            background: #003344;
            background-image: radial-gradient(circle at 50% -20%, #00acc144, transparent);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .header i { font-size: 20px; margin-right: 15px; cursor: pointer; color: #00acc1; }
        
        .card {
            background: rgba(0, 34, 45, 0.8);
            border: 1px solid rgba(0, 172, 193, 0.3);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            max-width: 500px;
            margin: 0 auto;
        }
        h2 { font-size: 22px; color: #ff8800; margin-bottom: 25px; letter-spacing: 1px; text-transform: uppercase; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: #00acc1; margin-bottom: 8px; font-weight: 700; }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 172, 193, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            outline: none;
        }
        
        .btn-pay {
            width: 100%;
            padding: 15px;
            background: #00acc1;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
        }

        #qrContainer {
            display: none;
            margin-top: 10px;
        }
        #qrImage {
            width: 240px;
            height: 240px;
            background: #fff;
            padding: 10px;
            border-radius: 15px;
            margin: 15px auto;
        }
        .status-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px dashed rgba(0, 172, 193, 0.3);
        }
        #statusText { font-size: 14px; color: #00acc1; font-weight: 700; }
        .btn-check {
            margin-top: 10px;
            background: none;
            border: 1px solid #ff8800;
            color: #ff8800;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.location.href='../dashboard.html'"></i>
        <h3>Top Up Saldo</h3>
    </div>

    <div class="card">
        <h2>Pembayaran Qris</h2>
        
        <div id="orderForm">
            <div class="input-group">
                <label>Nominal Deposit (Min. 5.000)</label>
                <input type="number" id="amount" placeholder="Masukkan jumlah nominal" required>
            </div>
            <button class="btn-pay" id="btnProses">Buat Pembayaran</button>
        </div>

        <div id="qrContainer">
            <p style="font-size: 13px; color: #668899;">Silahkan Scan Qris Di Bawah Ini</p>
            <img src="" id="qrImage" alt="QRIS">
            
            <div class="status-box">
                <p id="statusText">Menunggu Pembayaran...</p>
                <button class="btn-check" id="btnCekManual">Cek Status Manual</button>
            </div>
            <p id="refText" style="font-size: 11px; color: #557788; margin-top: 15px;"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let checkInterval;
        const btnProses = document.getElementById('btnProses');
        const statusText = document.getElementById('statusText');
        const btnCekManual = document.getElementById('btnCekManual');

        async function checkStatus(statusUrl) {
            try {
                const res = await fetch(statusUrl);
                const data = await res.json();

                if (data.status === 'PAID' || data.success === true) {
                    clearInterval(checkInterval);
                    Swal.fire({
                        icon: 'success',
                        title: 'Pembayaran Berhasil',
                        text: 'Saldo Anda telah ditambahkan secara otomatis.',
                        background: '#00222d',
                        color: '#fff'
                    }).then(() => {
                        window.location.href = '../dashboard.html';
                    });
                }
            } catch (e) {
                console.log("Error cek status");
            }
        }

        btnProses.onclick = async () => {
            const amount = document.getElementById('amount').value;
            
            if (amount < 1) {
                return Swal.fire({ icon: 'warning', title: 'Minimal Rp 5.000', background: '#00222d', color: '#fff' });
            }

            Swal.fire({
                title: 'Sedang Memproses',
                text: 'Mohon tunggu sebentar...',
                background: '#00222d',
                color: '#fff',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const apiReq = await fetch('/api/deposit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ amount: amount })
                });
                const res = await apiReq.json();

                if (res.success) {
                    Swal.close();
                    document.getElementById('orderForm').style.display = 'none';
                    document.getElementById('qrContainer').style.display = 'block';
                    document.getElementById('qrImage').src = res.qrImage;
                    document.getElementById('refText').innerText = "Referensi: " + res.reference;

                    checkInterval = setInterval(() => {
                        checkStatus(res.statusUrl);
                    }, 5000);

                    btnCekManual.onclick = () => {
                        checkStatus(res.statusUrl);
                        Swal.fire({ title: 'Mengecek...', timer: 1000, showConfirmButton: false, background: '#00222d', color: '#fff' });
                    };
                } else {
                    Swal.fire({ icon: 'error', title: 'Gagal', text: 'Terjadi kesalahan sistem', background: '#00222d', color: '#fff' });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Error', text: err.message, background: '#00222d', color: '#fff' });
            }
        };
    </script>
</body>
</html>
