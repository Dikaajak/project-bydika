<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIKA PEDIA - Pilih Negara</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #001a22; color: #fff; padding: 25px 20px; min-height: 100vh; }
        .header { display: flex; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(0, 172, 193, 0.1); }
        .header i { font-size: 20px; margin-right: 20px; cursor: pointer; color: #00acc1; }
        .header h3 { font-family: 'Rajdhani', sans-serif; font-weight: 800; letter-spacing: 1px; color: #ff8800; }

        .country-list { display: flex; flex-direction: column; gap: 12px; }
        .card-country { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 172, 193, 0.15); 
            border-radius: 16px; padding: 18px; display: flex; justify-content: space-between; 
            align-items: center; cursor: pointer; transition: 0.3s;
        }
        .card-country:hover { 
            border-color: #00acc1; background: rgba(0, 172, 193, 0.05); 
            transform: scale(1.02);
        }
        .c-info { display: flex; align-items: center; gap: 15px; }
        .c-info img { width: 32px; height: 22px; border-radius: 4px; object-fit: cover; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .c-info span { font-weight: 600; font-size: 15px; color: #eee; }
        .amount { color: #00ff88; font-weight: 800; font-family: 'Rajdhani', sans-serif; font-size: 17px; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.history.back()"></i>
        <h3 id="appTitle">NEGARA</h3>
    </div>
    <div id="countryList" class="country-list"></div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const serviceCode = urlParams.get('code');
        const serviceName = urlParams.get('name');
        const serviceImg = urlParams.get('img');
        document.getElementById('appTitle').innerText = serviceName;

        async function loadCountries() {
            try {
                const res = await axios.get(`https://www.rumahotp.io/api/v2/countries?service_id=${serviceCode}`, {
                    headers: { 'x-apikey': CONFIG_OTP.API_KEY_OTP }
                });
                if (res.data.success) {
                    const container = document.getElementById('countryList');
                    res.data.data.forEach(c => {
                        const basePrice = c.pricelist[0].price;
                        const finalPrice = basePrice + 1500; 
                        const card = document.createElement('div');
                        card.className = 'card-country';
                        card.onclick = () => window.location.href = `order_detail.html?code=${serviceCode}&name=${encodeURIComponent(serviceName)}&iso=${c.iso_code}&country=${encodeURIComponent(c.name)}&price=${finalPrice}&provider_id=${c.pricelist[0].provider_id}&app_img=${serviceImg}`;
                        card.innerHTML = `
                            <div class="c-info"><img src="${c.img}"><span>${c.name}</span></div>
                            <span class="amount">Rp ${finalPrice.toLocaleString()}</span>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (e) { console.error(e); }
        }
        loadCountries();
    </script>
</body>
</html>
