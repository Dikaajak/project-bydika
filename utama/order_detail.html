<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooxpedia - Pilih Aplikasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        body { background: #003344; color: #fff; padding: 20px; }
        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .header i { font-size: 20px; margin-right: 15px; cursor: pointer; color: #00acc1; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .card {
            background: rgba(0, 34, 45, 0.7);
            border: 1px solid rgba(0, 172, 193, 0.2);
            border-radius: 15px; padding: 20px; text-align: center; cursor: pointer;
        }
        .card:hover { border-color: #ff8800; transform: translateY(-3px); }
        .card img { width: 50px; height: 50px; border-radius: 10px; margin-bottom: 12px; }
        .card span { display: block; font-weight: 700; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-chevron-left" onclick="window.location.href='produk.html'"></i>
        <h3 id="titleName">APLIKASI</h3>
    </div>

    <div id="appList" class="grid-container"></div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const iso = urlParams.get('iso');
        const countryName = urlParams.get('name');
        document.getElementById('titleName').innerText = `APLIKASI DI ${countryName}`;

        async function fetchApps() {
            try {
                const response = await axios.get('https://www.rumahotp.io/api/v2/services', {
                    headers: { 'x-apikey': CONFIG_OTP.API_KEY_OTP }
                });
                if (response.data.success) {
                    const container = document.getElementById('appList');
                    response.data.data.forEach(app => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.onclick = () => {
                            window.location.href = `order_detail.html?code=${app.service_code}&name=${app.service_name}&iso=${iso}&country=${countryName}`;
                        };
                        card.innerHTML = `
                            <img src="${app.service_img}">
                            <span>${app.service_name}</span>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (e) { console.error(e); }
        }
        fetchApps();
    </script>
</body>
</html>
