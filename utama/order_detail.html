<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dika pedia - final order</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background: #001a22;
            background-image: radial-gradient(circle at 50% -20%, #00acc133, transparent);
            color: #fff; min-height: 100vh; padding: 25px 20px;
            text-transform: lowercase;
        }
        .header { display: flex; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid rgba(0, 172, 193, 0.1); }
        .header i { font-size: 20px; margin-right: 20px; cursor: pointer; color: #00acc1; }
        .header h3 { font-family: 'Rajdhani', sans-serif; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }

        .summary-card {
            background: linear-gradient(135deg, rgba(0, 34, 45, 0.9), rgba(0, 172, 193, 0.05));
            border: 1px solid rgba(255, 136, 0, 0.4);
            border-radius: 20px; padding: 25px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .summary-card h2 { color: #ff8800; font-family: 'Rajdhani', sans-serif; font-weight: 800; margin-bottom: 4px; text-transform: uppercase; }
        .summary-card p { opacity: 0.7; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .price-tag { 
            margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .price-tag span { font-size: 12px; font-weight: 800; color: #00acc1; text-transform: uppercase; }
        .price-tag b { color: #00ff88; font-size: 22px; font-family: 'Rajdhani', sans-serif; }

        .section-title { font-size: 11px; color: #00acc1; margin-bottom: 15px; text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; opacity: 0.8; }
        
        .operator-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 120px; }
        .op-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 172, 193, 0.15);
            border-radius: 15px; padding: 15px 5px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .op-card.active { border-color: #ff8800; background: rgba(255, 136, 0, 0.1); transform: translateY(-3px); }
        .op-card img { width: 40px; height: 40px; border-radius: 50%; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .op-card span { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #eee; }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0, 26, 34, 0.95);
            padding: 20px; border-top: 1px solid rgba(0, 172, 193, 0.2);
            backdrop-filter: blur(15px); display: none; animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .btn-buy {
            width: 100%; padding: 16px; background: linear-gradient(45deg, #ff8800, #e67e00); 
            border: none; border-radius: 15px;
            color: #fff; font-weight: 800; font-size: 15px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 136, 0, 0.3); text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.history.back()"></i>
        <h3>dika pedia</h3>
    </div>

    <div class="summary-card">
        <div style="display: flex; gap: 20px; align-items: center;">
            <img id="appImg" style="width: 60px; height: 60px; border-radius: 15px; border: 2px solid #00acc1;">
            <div>
                <h2 id="summaryApp">-</h2>
                <p id="summaryCountry">-</p>
            </div>
        </div>
        <div class="price-tag">
            <span>total pembayaran</span>
            <b id="summaryPrice">-</b>
        </div>
    </div>

    <div class="section-title">pilih operator tersedia</div>
    <div id="operatorList" class="operator-grid"></div>

    <div class="bottom-bar" id="bottomBar">
        <button class="btn-buy" id="btnBuy">konfirmasi pembelian</button>
    </div>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC_5LQ6U3DtMf4STbDjLymazm8I_zySbSw",
            authDomain: "myproject-485415.firebaseapp.com",
            databaseURL: "https://myproject-485415-default-rtdb.firebaseio.com",
            projectId: "myproject-485415",
            storageBucket: "myproject-485415.firebasestorage.app",
            messagingSenderId: "450623193142",
            appId: "1:450623193142:web:d7a9caf66e1dff8d495897"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        const urlParams = new URLSearchParams(window.location.search);
        const serviceCode = urlParams.get('code');
        const serviceName = decodeURIComponent(urlParams.get('name') || '');
        const countryName = decodeURIComponent(urlParams.get('country') || '');
        const finalPrice = parseInt(urlParams.get('price') || 0);
        const providerId = urlParams.get('provider_id');
        const appImg = decodeURIComponent(urlParams.get('app_img') || '');

        document.getElementById('summaryApp').innerText = serviceName;
        document.getElementById('summaryCountry').innerText = countryName;
        document.getElementById('summaryPrice').innerText = `rp ${finalPrice.toLocaleString()}`;
        document.getElementById('appImg').src = appImg;

        let selectedOp = null;

        async function loadOperators() {
            try {
                const res = await axios.get(`https://www.rumahotp.io/api/v2/operators?country=${countryName}&provider_id=${providerId}`, {
                    headers: { 'x-apikey': CONFIG_OTP.API_KEY_OTP }
                });
                if (res.data.success) {
                    const container = document.getElementById('operatorList');
                    res.data.data.forEach(op => {
                        const card = document.createElement('div');
                        card.className = 'op-card';
                        card.onclick = () => {
                            selectedOp = op;
                            document.querySelectorAll('.op-card').forEach(c => c.classList.remove('active'));
                            card.classList.add('active');
                            document.getElementById('bottomBar').style.display = 'block';
                        };
                        card.innerHTML = `
                            <img src="${op.image}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2921/2921226.png'">
                            <span>${op.name}</span>
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (e) { console.error("gagal muat operator"); }
        }

        document.getElementById('btnBuy').onclick = async () => {
            const user = auth.currentUser;
            if(!user) return;
            if(!selectedOp) return Swal.fire({ icon: 'warning', title: 'pilih operator dulu', background: '#00222d', color: '#fff' });

            Swal.fire({ title: 'sedang memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#00222d', color: '#fff' });

            try {
                const userRef = db.ref(`users/${user.uid}`);
                const userSnap = await userRef.once('value');
                const saldo = userSnap.val().saldo || 0;

                if (saldo < finalPrice) {
                    return Swal.fire({ icon: 'error', title: 'saldo kurang', text: 'silahkan top up dulu bos.', background: '#00222d', color: '#fff' });
                }

                const res = await axios.get(`https://www.rumahotp.io/api/v2/orders?number_id=${serviceCode}&provider_id=${providerId}&operator_id=${selectedOp.id}`, {
                    headers: { 
                        'x-apikey': CONFIG_OTP.API_KEY_OTP,
                        'Accept': 'application/json'
                    }
                });

                if (res.data.success) {
                    const order = res.data.data;
                    
                    await userRef.update({ saldo: saldo - finalPrice });

                    await db.ref(`orders/${user.uid}`).push({
                        order_id: order.order_id,
                        nomor: order.phone_number,
                        aplikasi: serviceName,
                        negara: countryName,
                        operator: selectedOp.name,
                        harga: finalPrice,
                        status: 'pending',
                        otp: '',
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });

                    Swal.fire({ icon: 'success', title: 'berhasil!', text: 'nomor sudah didapatkan.', background: '#00222d', color: '#fff' })
                    .then(() => window.location.href = 'riwayat.html');
                } else {
                    Swal.fire({ icon: 'error', title: 'gagal', text: res.data.msg || 'stok habis', background: '#00222d', color: '#fff' });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'error', text: 'koneksi bermasalah atau api key salah.', background: '#00222d', color: '#fff' });
            }
        };

        loadOperators();
    </script>
</body>
</html>
