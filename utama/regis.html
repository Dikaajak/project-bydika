<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIKA PEDIA - Daftar Akun</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        @keyframes pageIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            background: #001a22;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 172, 193, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 136, 0, 0.1) 0%, transparent 40%);
            color: #fff;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            animation: pageIn 0.8s ease-out forwards;
        }

        .banner-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 20px 20px 0 0;
            border: 2px solid rgba(0, 172, 193, 0.5);
            border-bottom: none;
            box-shadow: 0 0 15px rgba(0, 172, 193, 0.2);
        }

        .banner-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .form-card {
            background: rgba(0, 34, 45, 0.7); 
            padding: 35px 25px; 
            border-radius: 0 0 30px 30px; 
            border: 2px solid rgba(0, 172, 193, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
        }

        h2 { 
            font-family: 'Rajdhani', sans-serif;
            font-size: 32px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 5px;
            text-align: center;
            color: #fff;
        }

        .desc { 
            color: #00acc1; 
            font-size: 12px; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            font-weight: 800; 
            text-align: center;
            letter-spacing: 1px;
        }

        .input-box { margin-bottom: 18px; }

        .input-box label { 
            display: block; 
            font-size: 11px; 
            color: #ff8800; 
            margin-bottom: 6px; 
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            padding-left: 5px;
        }

        input { 
            width: 100%; 
            padding: 14px 18px; 
            background: rgba(0, 26, 34, 0.6); 
            border: 1px solid rgba(0, 172, 193, 0.3); 
            border-radius: 12px; 
            color: #fff;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus { 
            border-color: #00acc1; 
            background: rgba(0, 172, 193, 0.05); 
            box-shadow: 0 0 15px rgba(0, 172, 193, 0.2); 
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-auth { 
            width: 100%; 
            padding: 16px; 
            background: #00acc1; 
            color: #001a22; 
            border: 2px solid #00acc1; 
            border-radius: 14px; 
            font-weight: 800; 
            text-transform: uppercase;
            cursor: pointer;
            font-size: 15px;
            letter-spacing: 2px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-auth:hover { 
            background: transparent;
            color: #00acc1;
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px rgba(0, 172, 193, 0.3); 
        }

        .footer { 
            margin-top: 25px; 
            font-size: 13px; 
            color: rgba(255,255,255,0.6); 
            text-align: center;
        }

        .footer a { 
            color: #ff8800; 
            text-decoration: none; 
            font-weight: 800; 
            text-transform: uppercase;
            font-size: 12px;
            margin-left: 5px;
        }

        @media (max-width: 480px) {
            .form-card { padding: 30px 20px; }
            h2 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner-wrapper">
            <img src="https://i.ibb.co.com/zVykFCrG/wkcfhd.jpg" alt="Dika Pedia Banner">
        </div>
        
        <div class="form-card">
            <h2>DAFTAR</h2>
            <p class="desc">Buat akun baru DIKA PEDIA</p>
            
            <form id="regisForm">
                <div class="input-box">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Nama Anda" required>
                </div>
                <div class="input-box">
                    <label>Nomor WhatsApp</label>
                    <input type="number" id="nomorWa" placeholder="62818xxxx" required>
                </div>
                <div class="input-box">
                    <label>Alamat Email</label>
                    <input type="email" id="email" placeholder="email@gmail.com" required>
                </div>
                <div class="input-box">
                    <label>Buat Password</label>
                    <input type="password" id="pw" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Daftar Sekarang</button>
            </form>
            
            <div class="footer">
                Sudah punya akun? <a href="login.html">Login Disini</a>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="script.js"></script>

<script>
    function generateApiKey() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = 'DK-';
        for (let i = 0; i < 24; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    document.getElementById('regisForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nama = document.getElementById('nama').value;
        const nomorWa = document.getElementById('nomorWa').value;
        const email = document.getElementById('email').value;
        const pw = document.getElementById('pw').value;

        Swal.fire({
            title: 'Memproses...',
            background: '#00222d',
            color: '#fff',
            allowOutsideClick: false,
            didOpen: () => Swal.showLoading()
        });

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, pw);
            const user = userCredential.user;

            await db.ref('users/' + user.uid).set({
                nama: nama,
                nomorWa: nomorWa,
                email: email,
                saldo: 0,
                role: 'member',
                api_key: generateApiKey(),
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            Swal.fire({
                icon: 'success',
                title: 'Berhasil!',
                text: 'Selamat datang di DIKA PEDIA',
                background: '#00222d',
                color: '#fff',
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                window.location.href = 'dashboard.html';
            });

        } catch (error) {
            Swal.fire({
                icon: 'error',
                title: 'Gagal Daftar',
                text: error.message,
                background: '#00222d',
                color: '#fff'
            });
        }
    });
</script>
</body>
</html>
