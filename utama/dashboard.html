<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooxpedia - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        body { 
            background: #003344;
            background-image: radial-gradient(circle at 50% -20%, #00acc144, transparent);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 34, 45, 0.9);
            border-bottom: 1px solid rgba(0, 172, 193, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-left i { font-size: 24px; cursor: pointer; color: #00acc1; }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .balance-nav {
            background: rgba(0, 172, 193, 0.1);
            border: 1px solid rgba(0, 172, 193, 0.4);
            padding: 4px 12px;
            border-radius: 8px;
            text-align: right;
            cursor: pointer;
        }

        .balance-nav span {
            display: block;
            font-size: 9px;
            color: #00acc1;
            font-weight: 700;
            text-transform: uppercase;
        }

        .balance-nav h4 {
            font-size: 14px;
            color: #ff8800;
            margin-top: -2px;
        }

        .nav-right img { 
            width: 38px; height: 38px; 
            border-radius: 50%; border: 2px solid #00acc1; 
            cursor: pointer;
        }

        .sidebar {
            position: fixed;
            left: -280px; top: 0; width: 280px; height: 100%;
            background: #00222d; transition: 0.3s; z-index: 200; padding: 20px;
            border-right: 1px solid rgba(0, 172, 193, 0.2);
        }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; margin-bottom: 30px; align-items: center; }
        
        .sidebar-menu a {
            display: flex; align-items: center; color: #fff; text-decoration: none;
            padding: 12px 15px; background: rgba(0, 172, 193, 0.05);
            border-radius: 10px; margin-bottom: 10px; border: 1px solid transparent; transition: 0.3s;
        }
        .sidebar-menu a:hover { border-color: #00acc1; background: rgba(0, 172, 193, 0.1); }
        .sidebar-menu i { margin-right: 15px; color: #ff8800; width: 20px; text-align: center; }

        .overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 150;
        }
        .overlay.active { display: block; }

        .profile-card {
            display: none;
            position: absolute;
            top: 65px; right: 20px; width: 260px;
            background: #00222d; border: 1px solid #00acc1;
            border-radius: 15px; padding: 20px; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .profile-card.active { display: block; }
        .profile-card h3 { font-size: 14px; color: #ff8800; margin-bottom: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .info-item { margin-bottom: 12px; }
        .info-item label { display: block; font-size: 10px; color: #00acc1; font-weight: 700; }
        .info-item p { font-size: 14px; margin-top: 2px; }

        .btn-logout {
            width: 100%; padding: 10px; background: #ff4444;
            border: none; color: #fff; border-radius: 8px;
            cursor: pointer; font-weight: 700; margin-top: 10px;
        }

        .main-content { padding: 20px; max-width: 800px; margin: 0 auto; }

        .status-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .status-box {
            background: rgba(0, 34, 45, 0.7);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(0, 172, 193, 0.2);
            text-align: center;
        }

        .status-box span { display: block; font-size: 10px; color: #00acc1; font-weight: 700; margin-bottom: 5px; }
        .status-box p { font-size: 14px; font-weight: 700; color: #00ff88; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: rgba(0, 34, 45, 0.7);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 172, 193, 0.2);
        }

        .stat-card label { display: block; font-size: 10px; color: #ff8800; font-weight: 700; margin-bottom: 5px; }
        .stat-card h5 { font-size: 16px; color: #fff; }

        .rank-card {
            background: linear-gradient(45deg, rgba(255, 136, 0, 0.2), rgba(0, 172, 193, 0.2));
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 136, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .rank-card i { font-size: 24px; color: #ff8800; }
        .rank-info { text-align: right; }
        .rank-info label { display: block; font-size: 10px; color: #fff; font-weight: 700; }
        .rank-info p { font-size: 18px; font-weight: 700; color: #ff8800; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .menu-item {
            background: rgba(255,255,255,0.05); padding: 20px;
            border-radius: 12px; border: 1px solid rgba(0, 172, 193, 0.1);
            text-decoration: none; color: #fff; transition: 0.3s;
            text-align: center;
        }
        .menu-item:hover { border-color: #ff8800; transform: translateY(-3px); }
        .menu-item i { font-size: 28px; color: #ff8800; margin-bottom: 10px; display: block; }
        .menu-item span { font-size: 14px; font-weight: 700; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left" id="openSidebar"><i class="fas fa-bars"></i></div>
        <div class="nav-right">
            <div class="balance-nav" onclick="window.location.href='./pay/deposit.html'">
                <span>Saldo</span>
                <h4 id="topSaldo">Rp 0</h4>
            </div>
            <img src="https://i.ibb.co.com/rRYyNP25/20260420-202909.jpg" alt="Profile" id="toggleProfile">
        </div>
    </nav>

    <div class="overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3 style="color: #00acc1;">ROOXPEDIA</h3>
            <i class="fas fa-times" id="closeSidebar" style="cursor:pointer"></i>
        </div>
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fas fa-home"></i> <span>DASHBOARD</span></a>
            <a href="./pay/deposit.html"><i class="fas fa-wallet"></i> <span>DEPOSIT</span></a>
            <a href="#"><i class="fas fa-shopping-cart"></i> <span>BELI NOKOS</span></a>
            <a href="#"><i class="fas fa-history"></i> <span>RIWAYAT</span></a>
        </div>
    </div>

    <div class="profile-card" id="profileCard">
        <h3>MY PROFILE</h3>
        <div class="info-item">
            <label>NAMA</label>
            <p id="p-nama">-</p>
        </div>
        <div class="info-item">
            <label>ROLE</label>
            <p id="p-role" style="color: #ff8800; font-weight: 700;">-</p>
        </div>
        <div class="info-item">
            <label>SALDO</label>
            <p id="p-saldo-card">Rp 0</p>
        </div>
        <button class="btn-logout" id="btnLogout">LOGOUT</button>
    </div>

    <div class="main-content">
        
        <div class="status-container">
            <div class="status-box">
                <span>Status Layanan</span>
                <p>NORMAL</p>
            </div>
            <div class="status-box">
                <span>Status Server</span>
                <p>AKTIF</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <label>Pesanan Sukses</label>
                <h5 id="p-pesanan">0 / Rp 0</h5>
            </div>
            <div class="stat-card">
                <label>Total Deposit</label>
                <h5 id="p-deposit">Rp 0 / 0</h5>
            </div>
        </div>

        <div class="rank-card">
            <i class="fas fa-trophy"></i>
            <div class="rank-info">
                <label>PERINGKAT TOP DEPOSIT</label>
                <p id="p-rank">#1 (Rp 0)</p>
            </div>
        </div>

        <div class="menu-grid">
            <a href="./pay/deposit.html" class="menu-item">
                <i class="fas fa-plus-circle"></i>
                <span>Top Up</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-store"></i>
                <span>Produk</span>
            </a>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
