<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIKA PEDIA - Pilih Aplikasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background: #001a22; 
            background-image: radial-gradient(circle at 50% -20%, #00acc133, transparent); 
            color: #fff; min-height: 100vh; padding: 25px 20px; 
        }
        .header { 
            display: flex; align-items: center; margin-bottom: 30px; 
            padding-bottom: 20px; border-bottom: 1px solid rgba(0, 172, 193, 0.2); 
        }
        .header i { font-size: 20px; margin-right: 20px; cursor: pointer; color: #00acc1; transition: 0.3s; }
        .header i:hover { color: #ff8800; transform: translateX(-3px); }
        .header h3 { font-family: 'Rajdhani', sans-serif; font-weight: 800; letter-spacing: 2px; color: #fff; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }
        .card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 172, 193, 0.15); 
            border-radius: 20px; padding: 20px 10px; text-align: center; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .card:hover { 
            border-color: #ff8800; transform: translateY(-5px); 
            background: rgba(255, 136, 0, 0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .card img { width: 55px; height: 55px; border-radius: 15px; margin-bottom: 12px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .card span { display: block; font-weight: 700; font-size: 13px; text-transform: uppercase; color: #eee; letter-spacing: 0.5px; }
        
        #loader { text-align: center; padding: 60px; color: #00acc1; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.location.href='dashboard.html'"></i>
        <h3>DIKA PEDIA</h3>
    </div>
    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>
    <div id="appList" class="grid-container"></div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        async function fetchApps() {
            try {
                const res = await axios.get('https://www.rumahotp.io/api/v2/services', {
                    headers: { 'x-apikey': CONFIG_OTP.API_KEY_OTP }
                });
                if (res.data.success) {
                    const container = document.getElementById('appList');
                    res.data.data.forEach(app => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.onclick = () => window.location.href = `negara.html?code=${app.service_code}&name=${encodeURIComponent(app.service_name)}&img=${encodeURIComponent(app.service_img)}`;
                        card.innerHTML = `<img src="${app.service_img}"><span>${app.service_name}</span>`;
                        container.appendChild(card);
                    });
                }
            } catch (e) { console.error(e); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }
        fetchApps();
    </script>
</body>
</html>
