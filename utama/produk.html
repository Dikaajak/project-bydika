<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooxpedia - Beli Nokos</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        body { 
            background: #003344;
            background-image: radial-gradient(circle at 50% -20%, #00acc144, transparent);
            color: #fff; min-height: 100vh; padding: 20px;
        }
        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .header i { font-size: 20px; margin-right: 15px; cursor: pointer; color: #00acc1; }
        
        .search-box {
            background: rgba(0, 34, 45, 0.8);
            border: 1px solid rgba(0, 172, 193, 0.3);
            border-radius: 12px; padding: 12px 15px;
            display: flex; align-items: center; margin-bottom: 20px;
        }
        .search-box input {
            background: none; border: none; color: #fff; width: 100%;
            margin-left: 10px; outline: none; font-size: 16px;
        }

        .services-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }

        .service-card {
            background: rgba(0, 34, 45, 0.7);
            border: 1px solid rgba(0, 172, 193, 0.2);
            border-radius: 15px; padding: 15px;
            text-align: center; transition: 0.3s;
            cursor: pointer; position: relative; overflow: hidden;
        }
        .service-card:hover { border-color: #ff8800; transform: translateY(-3px); }
        .service-card img { width: 50px; height: 50px; border-radius: 10px; margin-bottom: 10px; }
        .service-card h4 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .service-card .price { color: #00ff88; font-size: 12px; margin-top: 5px; font-weight: 700; }

        .loading-state { text-align: center; padding: 50px; color: #00acc1; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.location.href='dashboard.html'"></i>
        <h3>Pilih Aplikasi</h3>
    </div>

    <div class="search-box">
        <i class="fas fa-search" style="color: #00acc1;"></i>
        <input type="text" id="searchApp" placeholder="Cari aplikasi (WhatsApp, dll)...">
    </div>

    <div id="servicesContainer" class="services-grid">
        <div class="loading-state">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top: 10px;">Mengambil data layanan...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        const API_KEY_OTP = "rk-dev-R97ZuJ5smvh4DBgJCrf7ztXE9CELFbhn";
        let allServices = [];

        async function fetchServices() {
            try {
                const response = await axios.get('https://www.rumahotp.io/api/v2/services', {
                    headers: { 'x-apikey': API_KEY_OTP, 'Accept': 'application/json' }
                });

                if (response.data.success) {
                    allServices = response.data.data;
                    displayServices(allServices);
                }
            } catch (error) {
                document.getElementById('servicesContainer').innerHTML = `<p style="color:red">Gagal memuat data</p>`;
            }
        }

        function displayServices(services) {
            const container = document.getElementById('servicesContainer');
            container.innerHTML = '';

            services.forEach(item => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.onclick = () => selectService(item.service_code, item.service_name);
                
                card.innerHTML = `
                    <img src="${item.service_img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/254/254638.png'">
                    <h4>${item.service_name}</h4>
                    <div class="price">KLIK UNTUK CEK</div>
                `;
                container.appendChild(card);
            });
        }

        function selectService(code, name) {
            Swal.fire({
                title: 'Konfirmasi',
                text: "Beli nomor untuk " + name + "?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Lanjut',
                background: '#00222d',
                color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = `order_detail.html?code=${code}&name=${name}`;
                }
            });
        }

        document.getElementById('searchApp').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allServices.filter(s => s.service_name.toLowerCase().includes(val));
            displayServices(filtered);
        };

        fetchServices();
    </script>
</body>
</html>
