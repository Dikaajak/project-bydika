<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooxpedia - One Page Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        body { background: #003344; color: #fff; padding: 15px; padding-bottom: 100px; }
        .section-title { font-size: 14px; color: #00acc1; margin: 15px 0 10px; text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        
        .scroll-x { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .scroll-x::-webkit-scrollbar { display: none; }

        .card { min-width: 100px; background: rgba(0, 34, 45, 0.8); border: 1px solid rgba(0, 172, 193, 0.2); border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; }
        .card.active { border-color: #ff8800; background: rgba(255, 136, 0, 0.1); }
        .card img { width: 40px; height: 40px; border-radius: 8px; margin-bottom: 5px; }
        .card span { display: block; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .list-v { display: flex; flex-direction: column; gap: 8px; }
        .item-v { background: rgba(0, 34, 45, 0.8); border: 1px solid rgba(0, 172, 193, 0.2); border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .item-v.active { border-color: #ff8800; background: rgba(255, 136, 0, 0.1); }
        .item-v img { width: 25px; height: 18px; border-radius: 2px; margin-right: 10px; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0, 34, 45, 0.95); padding: 15px; border-top: 1px solid rgba(0, 172, 193, 0.3); display: none; z-index: 100; }
        .btn-buy { width: 100%; padding: 15px; background: #ff8800; border: none; border-radius: 10px; color: #fff; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="section-title"><i class="fas fa-th-large"></i> 1. pilih aplikasi</div>
    <div id="appList" class="scroll-x"></div>

    <div id="sectionNegara" style="display:none;">
        <div class="section-title"><i class="fas fa-globe"></i> 2. pilih negara</div>
        <div id="countryList" class="list-v"></div>
    </div>

    <div id="sectionOperator" style="display:none;">
        <div class="section-title"><i class="fas fa-signal"></i> 3. pilih operator</div>
        <div id="opList" class="scroll-x"></div>
    </div>

    <div class="bottom-bar" id="bottomBar">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:14px;">
            <span id="txtSummary">-</span>
            <b id="txtPrice" style="color:#00ff88;">-</b>
        </div>
        <button class="btn-buy" id="btnBuy">order sekarang</button>
    </div>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC_5LQ6U3DtMf4STbDjLymazm8I_zySbSw",
            authDomain: "myproject-485415.firebaseapp.com",
            databaseURL: "https://myproject-485415-default-rtdb.firebaseio.com",
            projectId: "myproject-485415",
            storageBucket: "myproject-485415.firebasestorage.app",
            messagingSenderId: "450623193142",
            appId: "1:450623193142:web:d7a9caf66e1dff8d495897"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let selApp = null, selCountry = null, selOp = null, finalPrice = 0;

        async function init() {
            try {
                const res = await axios.get('https://www.rumahotp.io/api/v2/services', { headers: { 'x-apikey': CONFIG_OTP.API_KEY_OTP } });
                if (res.data.success) {
                    const cont = document.getElementById('appList');
                    res.data.data.forEach(app => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.onclick = () => selectApp(app, div);
                        div.innerHTML = `<img src="${app.service_img}"><span>${app.service_name}</span>`;
                        cont.appendChild(div);
                    });
                }
            } catch (e) { console.error(e); }
        }

        async function selectApp(app, el) {
            selApp = app; selCountry = null; selOp = null;
            document.querySelectorAll('#appList .card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('sectionNegara').style.display = 'block';
            document.getElementById('sectionOperator').style.display = 'none';
            document.getElementById('bottomBar').style.display = 'none';
            
            const cont = document.getElementById('countryList');
            cont.innerHTML = '<p style="font-size:12px; opacity:0.5;">memuat negara...</p>';

            try {
                const res = await axios.get(`https://www.rumahotp.io/api/v2/countries?service_id=${app.service_code}`, { headers: { 'x-apikey': CONFIG_OTP.API_KEY_OTP } });
                cont.innerHTML = '';
                res.data.data.forEach(c => {
                    if(c.stock_total > 0) {
                        const item = document.createElement('div');
                        item.className = 'item-v';
                        const price = c.pricelist[0].price + 1500;
                        item.onclick = () => selectCountry(c, item, price);
                        item.innerHTML = `
                            <div style="display:flex; align-items:center;"><img src="${c.img}"><span>${c.name} (stok: ${c.stock_total})</span></div>
                            <b style="color:#00ff88;">rp ${price.toLocaleString()}</b>
                        `;
                        cont.appendChild(item);
                    }
                });
            } catch (e) { cont.innerHTML = 'gagal memuat.'; }
        }

        async function selectCountry(c, el, price) {
            selCountry = c; finalPrice = price; selOp = null;
            document.querySelectorAll('#countryList .item-v').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('sectionOperator').style.display = 'block';
            document.getElementById('bottomBar').style.display = 'none';

            const cont = document.getElementById('opList');
            cont.innerHTML = '...';

            try {
                const res = await axios.get(`https://www.rumahotp.io/api/v2/operators?country=${c.name}&provider_id=${c.pricelist[0].provider_id}`, { headers: { 'x-apikey': CONFIG_OTP.API_KEY_OTP } });
                cont.innerHTML = '';
                res.data.data.forEach(op => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.onclick = () => {
                        selOp = op;
                        document.querySelectorAll('#opList .card').forEach(x => x.classList.remove('active'));
                        div.classList.add('active');
                        document.getElementById('bottomBar').style.display = 'block';
                        document.getElementById('txtSummary').innerText = `${selApp.service_name} - ${selCountry.name}`;
                        document.getElementById('txtPrice').innerText = `rp ${finalPrice.toLocaleString()}`;
                    };
                    div.innerHTML = `<img src="${op.image}"><span>${op.name}</span>`;
                    cont.appendChild(div);
                });
            } catch (e) { cont.innerHTML = 'error.'; }
        }

        document.getElementById('btnBuy').onclick = async () => {
            const u = auth.currentUser;
            if(!u) return;

            Swal.fire({ 
                title: 'memproses...', 
                background: '#00222d',
                color: '#fff',
                allowOutsideClick: false, 
                didOpen: () => Swal.showLoading() 
            });

            try {
                const uRef = db.ref(`users/${u.uid}`);
                const snap = await uRef.once('value');
                const sal = snap.val().saldo || 0;

                if(sal < finalPrice) return Swal.fire({ icon:'error', title:'saldo kurang', background:'#00222d', color:'#fff' });

                const res = await axios.get(`https://www.rumahotp.io/api/v2/orders?number_id=${selCountry.number_id}&provider_id=${selCountry.pricelist[0].provider_id}&operator_id=${selOp.id}`, {
                    headers: { 'x-apikey': CONFIG_OTP.API_KEY_OTP }
                });

                if(res.data.success) {
                    const dataPusat = res.data.data;
                    await uRef.update({ saldo: sal - finalPrice });
                    await db.ref(`orders/${u.uid}`).push({
                        order_id: dataPusat.order_id,
                        nomor: dataPusat.phone_number,
                        aplikasi: selApp.service_name,
                        negara: selCountry.name,
                        harga: finalPrice,
                        status: 'PENDING',
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'sukses',
                        html: `<pre style="text-align:left; font-size:10px;">${JSON.stringify(res.data, null, 2)}</pre>`,
                        background: '#00222d',
                        color: '#fff'
                    }).then(() => window.location.href = 'riwayat.html');
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'provider menolak',
                        html: `<pre style="text-align:left; font-size:10px; color:#ff8888;">${JSON.stringify(res.data, null, 2)}</pre>`,
                        background: '#00222d',
                        color: '#fff'
                    });
                }
            } catch(e) { 
                Swal.fire({
                    icon: 'error',
                    title: 'sistem error',
                    text: e.message,
                    background: '#00222d',
                    color: '#fff'
                });
            }
        };

        init();
    </script>
</body>
</html>
