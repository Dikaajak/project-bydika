<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIKA PEDIA - Digital Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: #001a22;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 172, 193, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 136, 0, 0.1) 0%, transparent 40%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        .hero-section {
            width: 100%;
            max-width: 500px;
            margin-top: 30px;
            text-align: center;
        }

        .banner-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 20px;
            margin-bottom: 25px;
            position: relative;
            border: 2px solid rgba(0, 172, 193, 0.5);
            box-shadow: 0 0 15px rgba(0, 172, 193, 0.2);
        }

        .banner-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 { 
            font-family: 'Rajdhani', sans-serif;
            font-size: 42px; 
            font-weight: 800;
            letter-spacing: 5px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 172, 193, 0.5);
            margin-bottom: 5px;
        }

        .typing-box {
            font-size: 14px;
            color: #ff8800;
            font-weight: 700;
            margin-bottom: 35px;
            letter-spacing: 2px;
            height: 20px;
            text-transform: uppercase;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 40px;
            padding: 0 5px;
        }

        .service-item {
            background: rgba(0, 172, 193, 0.05);
            padding: 15px 5px;
            border-radius: 15px;
            border: 1px solid rgba(0, 172, 193, 0.3);
            transition: 0.3s;
        }

        .service-item:hover {
            border-color: #00acc1;
            background: rgba(0, 172, 193, 0.1);
            transform: translateY(-2px);
        }

        .service-item i {
            font-size: 20px;
            color: #00acc1;
            margin-bottom: 8px;
            display: block;
        }

        .service-item span {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
            letter-spacing: 0.5px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 5px;
        }

        .btn-pedia {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .btn-primary {
            background: #00acc1;
            color: #001a22;
            border-color: #00acc1;
            box-shadow: 0 8px 20px rgba(0, 172, 193, 0.2);
        }

        .btn-primary:hover {
            background: transparent;
            color: #00acc1;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            border-color: rgba(0, 172, 193, 0.5);
        }

        .btn-outline:hover {
            border-color: #ff8800;
            color: #ff8800;
            background: rgba(255, 136, 0, 0.05);
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .hero-section { 
                max-width: 100%;
                padding: 0 20px;
            }
            h1 { font-size: 36px; }
            .services-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="banner-wrapper">
            <img src="https://i.ibb.co.com/zVykFCrG/wkcfhd.jpg" alt="Dika Pedia Banner">
        </div>

        <h1>DIKA PEDIA</h1>
        <div class="typing-box" id="typewriter"></div>

        <div class="services-grid">
            <div class="service-item">
                <i class="fas fa-users"></i>
                <span>Suntik Sosmed</span>
            </div>
            <div class="service-item">
                <i class="fas fa-shopping-bag"></i>
                <span>Jual Beli Akun</span>
            </div>
            <div class="service-item">
                <i class="fas fa-mobile-alt"></i>
                <span>Nokos OTP</span>
            </div>
            <div class="service-item">
                <i class="fab fa-whatsapp"></i>
                <span>Jasa Post WA</span>
            </div>
            <div class="service-item">
                <i class="fas fa-share-alt"></i>
                <span>Jasher</span>
            </div>
            <div class="service-item">
                <i class="fas fa-bolt"></i>
                <span>Fast Respon</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="utama/regis" class="btn btn-pedia btn-primary">
                <i class="fas fa-paper-plane"></i> Mulai Sekarang
            </a>
            <a href="utama/login" class="btn btn-pedia btn-outline">
                <i class="fas fa-sign-in-alt"></i> Masuk Ke Akun
            </a>
        </div>
    </div>

    <script>
        const texts = [
            "Solusi Digital Terlengkap",
            "Suntik Sosmed & Followers",
            "Penyedia Nokos Terpercaya",
            "Jasa Post WA & Jasher"
        ];
        let count = 0;
        let index = 0;
        let currentText = "";
        let letter = "";

        function type() {
            if (count === texts.length) count = 0;
            currentText = texts[count];
            letter = currentText.slice(0, ++index);

            document.getElementById("typewriter").textContent = letter;
            if (letter.length === currentText.length) {
                count++;
                index = 0;
                setTimeout(type, 2500);
            } else {
                setTimeout(type, 80);
            }
        }

        window.onload = type;
    </script>
</body>
</html>
