<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dika Pedia - Digital Marketplace & Jasa Sosmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        
        body { 
            background: #001a22;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 172, 193, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 136, 0, 0.1) 0%, transparent 40%);
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            overflow-x: hidden;
        }

        .container { 
            background: rgba(0, 34, 45, 0.4); 
            padding: 50px 30px; 
            border-radius: 35px; 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 172, 193, 0.2);
            max-width: 650px; 
            width: 100%; 
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .logo-box {
            position: relative;
            margin-bottom: 25px;
        }

        .logo-box img {
            /* PERUBAHAN DI SINI: Thumbnail Kotak */
            width: 130px;
            height: 130px;
            border-radius: 20px; /* Sedikit melengkung di sudut, tapi tidak bulat */
            border: 3px solid #00acc1;
            padding: 5px;
            background: #001a22;
            box-shadow: 0 0 25px rgba(0, 172, 193, 0.4);
            object-fit: cover; /* Biar gambar tidak ketarik */
        }

        h1 { 
            font-size: 45px; 
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 172, 193, 0.5);
        }

        .typing-container {
            font-size: 18px;
            color: #ff8800;
            font-weight: 600;
            margin-bottom: 40px;
            letter-spacing: 1px;
            height: 20px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 172, 193, 0.1);
            padding: 15px 10px;
            border-radius: 18px;
            transition: 0.3s;
        }

        .service-card:hover {
            background: rgba(0, 172, 193, 0.1);
            border-color: #00acc1;
            transform: translateY(-5px);
        }

        .service-card i {
            font-size: 20px;
            color: #00acc1;
            margin-bottom: 8px;
            display: block;
        }

        .service-card span {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-wrapper { 
            display: flex; 
            flex-direction: column;
            gap: 15px; 
        }

        .btn { 
            width: 100%;
            padding: 18px; 
            border-radius: 15px; 
            text-decoration: none; 
            font-weight: 700; 
            text-transform: uppercase; 
            transition: 0.3s; 
            font-size: 15px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-main { 
            background: #00acc1;
            color: #001a22; 
            box-shadow: 0 10px 20px rgba(0, 172, 193, 0.2);
        }

        .btn-main:hover { 
            background: #00d4ed;
            transform: scale(1.02);
        }

        .btn-sec { 
            background: transparent; 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-sec:hover { 
            border-color: #ff8800;
            color: #ff8800;
        }

        @media (max-width: 480px) {
            .services-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <img src="https://i.ibb.co.com/rRYyNP25/20260420-202909.jpg" alt="Dika Pedia">
        </div>
        
        <h1>DIKA PEDIA</h1>
        <div class="typing-container" id="typewriter"></div>
        
        <div class="services-grid">
            <div class="service-card">
                <i class="fas fa-users"></i>
                <span>Suntik Sosmed</span>
            </div>
            <div class="service-card">
                <i class="fas fa-shopping-bag"></i>
                <span>Jual Beli Akun</span>
            </div>
            <div class="service-card">
                <i class="fas fa-mobile-alt"></i>
                <span>Nokos OTP</span>
            </div>
            <div class="service-card">
                <i class="fab fa-whatsapp"></i>
                <span>Jasa Post WA</span>
            </div>
            <div class="service-card">
                <i class="fas fa-share-alt"></i>
                <span>Jasher</span>
            </div>
            <div class="service-card">
                <i class="fas fa-bolt"></i>
                <span>Fast Respon</span>
            </div>
        </div>

        <div class="btn-wrapper">
            <a href="utama/regis" class="btn btn-main">
                <i class="fas fa-rocket"></i> Daftar Sekarang
            </a>
            <a href="utama/login" class="btn btn-sec">
                <i class="fas fa-sign-in-alt"></i> Masuk Dashboard
            </a>
        </div>
    </div>

    <script>
        const texts = [
            "Solusi Digital Terlengkap",
            "Suntik Sosmed Murah",
            "Penyedia Nokos Terpercaya",
            "Jasa Post WA & Jasher"
        ];
        let count = 0;
        let index = 0;
        let currentText = "";
        let letter = "";

        function type() {
            if (count === texts.length) {
                count = 0;
            }
            currentText = texts[count];
            letter = currentText.slice(0, ++index);

            document.getElementById("typewriter").textContent = letter;
            if (letter.length === currentText.length) {
                count++;
                index = 0;
                setTimeout(type, 2000);
            } else {
                setTimeout(type, 100);
            }
        }

        window.onload = type;
    </script>
</body>
</html>
