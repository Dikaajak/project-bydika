<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dika Pedia - Digital Marketplace & Jasa Sosmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: #001a22;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 172, 193, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 136, 0, 0.1) 0%, transparent 40%);
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            overflow-x: hidden;
        }

        .container { 
            background: rgba(0, 34, 45, 0.6); 
            padding: 40px 25px; 
            border-radius: 30px; 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 172, 193, 0.2);
            max-width: 550px; 
            width: 100%; 
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .banner-box {
            position: relative;
            margin-bottom: 25px;
            width: 100%;
        }

        .banner-box img {
            /* Rasio 16:9 Kotak Lebar */
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 18px; 
            border: 2px solid rgba(0, 172, 193, 0.5);
            background: #001a22;
            box-shadow: 0 0 20px rgba(0, 172, 193, 0.3);
            object-fit: cover;
        }

        h1 { 
            font-family: 'Rajdhani', sans-serif;
            font-size: 42px; 
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 5px;
            color: #fff;
            text-transform: uppercase;
        }

        .typing-container {
            font-size: 16px;
            color: #ff8800;
            font-weight: 700;
            margin-bottom: 35px;
            letter-spacing: 1px;
            height: 20px;
            text-transform: uppercase;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 35px;
        }

        .service-card {
            background: rgba(0, 172, 193, 0.05);
            border: 1px solid rgba(0, 172, 193, 0.1);
            padding: 15px 5px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .service-card:hover {
            background: rgba(0, 172, 193, 0.15);
            border-color: #00acc1;
            transform: translateY(-3px);
        }

        .service-card i {
            font-size: 22px;
            color: #00acc1;
            margin-bottom: 8px;
            display: block;
        }

        .service-card span {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.9);
        }

        .btn-wrapper { 
            display: flex; 
            flex-direction: column;
            gap: 12px; 
        }

        .btn { 
            width: 100%;
            padding: 16px; 
            border-radius: 14px; 
            text-decoration: none; 
            font-weight: 800; 
            text-transform: uppercase; 
            transition: 0.3s; 
            font-size: 14px;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-main { 
            background: #00acc1;
            color: #001a22; 
            box-shadow: 0 8px 15px rgba(0, 172, 193, 0.2);
        }

        .btn-main:hover { 
            background: #00d4ed;
            transform: translateY(-2px);
        }

        .btn-sec { 
            background: rgba(255, 255, 255, 0.03); 
            color: #fff; 
            border: 1px solid rgba(0, 172, 193, 0.3);
        }

        .btn-sec:hover { 
            background: rgba(0, 172, 193, 0.1);
            border-color: #ff8800;
            color: #ff8800;
        }

        @media (max-width: 480px) {
            .services-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 34px; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner-box">
            <img src="https://i.ibb.co.com/gLrH15Rv/IMG-20250225-WA0024.jpg" alt="Dika Pedia Banner">
        </div>
        
        <h1>DIKA PEDIA</h1>
        <div class="typing-container" id="typewriter"></div>
        
        <div class="services-grid">
            <div class="service-card">
                <i class="fas fa-users"></i>
                <span>Suntik Sosmed</span>
            </div>
            <div class="service-card">
                <i class="fas fa-shopping-bag"></i>
                <span>Jual Beli Akun</span>
            </div>
            <div class="service-card">
                <i class="fas fa-mobile-alt"></i>
                <span>Nokos OTP</span>
            </div>
            <div class="service-card">
                <i class="fab fa-whatsapp"></i>
                <span>Jasa Post WA</span>
            </div>
            <div class="service-card">
                <i class="fas fa-share-alt"></i>
                <span>Jasher</span>
            </div>
            <div class="service-card">
                <i class="fas fa-check-circle"></i>
                <span>Terpercaya</span>
            </div>
        </div>

        <div class="btn-wrapper">
            <a href="utama/regis" class="btn btn-main">
                <i class="fas fa-user-plus"></i> Daftar Sekarang
            </a>
            <a href="utama/login" class="btn btn-sec">
                <i class="fas fa-sign-in-alt"></i> Masuk Dashboard
            </a>
        </div>
    </div>

    <script>
        const texts = [
            "Solusi Digital Terlengkap",
            "Suntik Sosmed & Followers",
            "Penyedia Nokos OTP Murah",
            "Jasa Post WA & Jasher"
        ];
        let count = 0;
        let index = 0;
        let currentText = "";
        let letter = "";

        function type() {
            if (count === texts.length) {
                count = 0;
            }
            currentText = texts[count];
            letter = currentText.slice(0, ++index);

            document.getElementById("typewriter").textContent = letter;
            if (letter.length === currentText.length) {
                count++;
                index = 0;
                setTimeout(type, 2500);
            } else {
                setTimeout(type, 80);
            }
        }

        window.onload = type;
    </script>
</body>
</html>
